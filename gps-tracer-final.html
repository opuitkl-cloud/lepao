<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轨迹绘制 · GPS Mapper</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --bg: #0d0f14; --surface: #141720; --surface2: #1c2030;
  --border: #262c3e; --accent: #4fffb0; --accent2: #ff6b6b;
  --accent3: #ffd93d; --text: #e0e6f0; --text-dim: #6b7a99;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; gap: 16px;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 15px; color: var(--accent); letter-spacing: .08em; }
.logo span { color: var(--text-dim); font-weight: 300; }
.header-stats { display: flex; gap: 18px; margin-left: auto; align-items: center; }
.stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.stat-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .12em; }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 600; }

/* ── LAYOUT ── */
.main-layout {
  display: flex; flex: 1; overflow: hidden;
  height: calc(100vh - 49px); margin-top: 49px;
}
.sidebar {
  width: 272px; min-width: 272px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* ── SECTIONS (ordered on both mobile and desktop) ── */
.sidebar { flex-direction: column; }
#sec-layer    { order: 1; }
#sec-drawing  { order: 2; }
#sec-image    { order: 3; }
#sec-motion   { order: 4; }
#sec-json     { order: 5; }

.section { padding: 14px 16px; border-bottom: 1px solid var(--border); }

/* ── COLLAPSIBLE ── */
.sec-title {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: .15em;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sec-title.collapsible { cursor: pointer; user-select: none; }
.collapse-arrow { transition: transform .2s; font-style: normal; margin-left: 2px; }
.sec-title.collapsed .collapse-arrow { transform: rotate(-90deg); }
.sec-body { overflow: hidden; }
.sec-body.collapsed { max-height: 0 !important; }

/* ── FORMS ── */
label { display: block; font-size: 11px; color: var(--text-dim); margin: 6px 0 3px; font-family: 'JetBrains Mono', monospace; }
input[type="text"], input[type="number"], input[type="file"] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 6px 9px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; transition: border-color .15s;
}
input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
input[type="file"] { padding: 5px; font-size: 11px; color: var(--text-dim); cursor: pointer; }
.coord-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 8px 12px; border: none; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s; letter-spacing: .05em; margin-top: 6px;
}
.btn-primary { background: var(--accent); color: #0d0f14; }
.btn-primary:hover { background: #6fffbe; }
.btn-danger  { background: var(--accent2); color: #fff; }
.btn-danger:hover  { background: #ff8585; }
.btn-warning { background: var(--accent3); color: #0d0f14; }
.btn-warning:hover { background: #ffe26a; }
.btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-ghost:hover   { border-color: var(--text); color: var(--text); }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.add-tab-btn {
  padding: 3px 8px; background: transparent; border: 1px dashed var(--border);
  border-radius: 4px; font-size: 13px; color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.add-tab-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── IMAGE TABS ── */
.img-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
.img-tab {
  padding: 3px 9px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.img-tab.active { background: rgba(79,255,176,.1); border-color: var(--accent); color: var(--accent); }

/* ── STATUS ── */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .08em; margin-top: 6px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-drawing .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
.status-paused .status-dot  { background: var(--accent3); }
.status-idle .status-dot    { background: var(--text-dim); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── CHECKIN ── */
.checkin-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.checkin-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px; position: relative; display: flex; flex-direction: column; gap: 5px;
}
.checkin-item.active { border-color: var(--accent); box-shadow: 0 0 10px rgba(79,255,176,.2); }
.ci-header { display: flex; align-items: center; gap: 6px; }
.ci-icon {
  width: 20px; height: 20px; flex-shrink: 0; border-radius: 50%;
  border: 2px solid var(--text-dim); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.ci-icon::after { content: ''; width: 8px; height: 2px; background: var(--text-dim); border-radius: 1px; transition: all .15s; }
.checkin-item.active .ci-icon { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
.checkin-item.active .ci-icon::after { background: var(--accent); }
.ci-name-input {
  flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 1px 4px; outline: none;
}
.ci-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; padding: 0 2px; transition: color .15s; }
.ci-del:hover { color: var(--accent2); }
.ci-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
.ci-fields input { padding: 3px 5px !important; font-size: 10px !important; margin-top: 0 !important; }
.ci-count-row { display: flex; align-items: center; gap: 5px; }
.ci-count-row label { margin: 0; font-size: 10px; white-space: nowrap; }
.ci-count-row input { width: 48px !important; padding: 3px 5px !important; font-size: 10px !important; margin-top: 0 !important; }
.ci-count-note { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); }

/* ── CHECKIN RESULT ── */
.checkin-result {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  padding: 9px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); margin-bottom: 8px; line-height: 1.7;
}
.checkin-result .hit  { color: var(--accent); }
.checkin-result .miss { color: var(--accent2); }

/* ── JSON PREVIEW ── */
.json-preview {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  padding: 9px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--accent); max-height: 150px; overflow-y: auto;
  white-space: pre; word-break: break-all; margin-top: 6px; line-height: 1.5;
}

/* ── CANVAS ── */
.canvas-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tool-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
.tool-group { display: flex; gap: 4px; align-items: center; }
.color-btn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all .15s; }
.color-btn.active { border-color: #fff; }
.size-btn {
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); transition: all .15s;
}
.size-btn.active { background: rgba(79,255,176,.1); border-color: var(--accent); color: var(--accent); }
.divider { width: 1px; height: 22px; background: var(--border); margin: 0 3px; }
.canvas-wrapper {
  flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center;
  background: repeating-linear-gradient(0deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px),
              repeating-linear-gradient(90deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px), var(--bg);
  position: relative;
}
.canvas-container { position: relative; display: inline-block; box-shadow: 0 0 0 1px var(--border), 0 20px 80px rgba(0,0,0,.6); }
#bgCanvas { display: block; position: relative; }
#drawCanvas { display: block; position: absolute; top: 0; left: 0; cursor: crosshair; }
.empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-dim); user-select: none; }
.empty-icon { font-size: 44px; opacity: .3; }
.empty-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .05em; }
.coord-display {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(13,15,20,.88); border: 1px solid var(--border); border-radius: 4px;
  padding: 5px 9px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); pointer-events: none; backdrop-filter: blur(4px);
}

/* ── MISC ── */
.points-info { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.points-info span { color: var(--accent); }
input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: var(--border); border-radius: 2px; outline: none; margin-top: 6px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.copy-note {
  position: fixed; top: 60px; right: 16px; background: var(--accent); color: #0d0f14;
  padding: 7px 14px; border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; z-index: 999; opacity: 0;
  transform: translateY(-8px); transition: all .2s; pointer-events: none;
}
.copy-note.show { opacity: 1; transform: translateY(0); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  header { padding: 10px 14px; }
  .stat-label { font-size: 8px; }
  .stat-value { font-size: 12px; }
  .main-layout { flex-direction: column; height: auto; overflow: visible; margin-top: 45px; }
  .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); overflow-y: visible; flex-shrink: 0; }
  .canvas-area { height: 65vh; min-height: 300px; flex-shrink: 0; }
  .canvas-wrapper { flex: 1; }
}
</style>
</head>
<body>

<header>
  <div class="logo">GPS<span>/</span>TRACER</div>
  <div class="header-stats">
    <div class="stat"><div class="stat-label">总距离</div><div class="stat-value" id="totalDistStat">0 m</div></div>
    <div class="stat"><div class="stat-label">记录点</div><div class="stat-value" id="recordedPtsStat">0</div></div>
    <div class="stat"><div class="stat-label">均速</div><div class="stat-value" id="avgSpeedStat">0 m/s</div></div>
  </div>
</header>

<div class="main-layout">
<div class="sidebar">

  <!-- 1. 图层管理 (collapsible) -->
  <div class="section" id="sec-layer">
    <div class="sec-title collapsible" id="layerTitle" onclick="toggleSection('layerTitle','layerBody')">
      图层管理 <span class="collapse-arrow">▾</span>
    </div>
    <div class="sec-body" id="layerBody">
      <div class="img-tabs" id="imgTabs"></div>
      <button class="add-tab-btn" onclick="addImageTab()">＋ 添加图层</button>

      <div style="margin-top:10px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;">打卡点</div>
        <div class="checkin-list" id="checkinList"></div>
        <button class="btn btn-ghost" style="font-size:11px;" onclick="addCheckinPoint()">＋ 添加打卡点</button>
      </div>
    </div>
  </div>

  <!-- 2. 绘制控制 -->
  <div class="section" id="sec-drawing">
    <div class="sec-title">绘制控制</div>
    <div id="statusBadge" class="status-badge status-idle">
      <div class="status-dot"></div><span id="statusText">待机</span>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-primary" id="drawBtn" onclick="startDrawing()">▶ 开始绘制</button>
      <button class="btn btn-warning" id="pauseBtn" onclick="pauseDrawing()" disabled>⏸ 暂停</button>
    </div>
    <button class="btn btn-danger"  onclick="clearTrack()">✕ 清除轨迹</button>
    <button class="btn btn-ghost"   onclick="undoLast()">↩ 撤销最后段</button>
  </div>

  <!-- 3. 图片与坐标 -->
  <div class="section" id="sec-image">
    <div class="sec-title">图片与坐标</div>
    <label>地图图片</label>
    <input type="file" accept="image/*" id="imgUpload" onchange="loadImage(event)">
    <div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:2px;">右上角坐标（NE）</div>
    <div class="coord-row">
      <div><label>纬度 Lat</label><input type="number" step="0.000001" id="neLat" placeholder="40.123456"></div>
      <div><label>经度 Lng</label><input type="number" step="0.000001" id="neLng" placeholder="116.654321"></div>
    </div>
    <div style="margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:2px;">左下角坐标（SW）</div>
    <div class="coord-row">
      <div><label>纬度 Lat</label><input type="number" step="0.000001" id="swLat" placeholder="40.000000"></div>
      <div><label>经度 Lng</label><input type="number" step="0.000001" id="swLng" placeholder="116.500000"></div>
    </div>
  </div>

  <!-- 4. 运动参数 -->
  <div class="section" id="sec-motion">
    <div class="sec-title">运动参数</div>
    <label>运动总时间（秒）</label>
    <input type="number" id="totalTime" value="3600" min="1">
    <div class="coord-row" style="margin-top:2px;">
      <div><label>最小速度 (m/s)</label><input type="number" id="minSpeed" value="2" min="0.1" step="0.1"></div>
      <div><label>最大速度 (m/s)</label><input type="number" id="maxSpeed" value="20" min="0.1" step="0.1"></div>
    </div>
    <label>采样间隔（每N个原始点）</label>
    <input type="number" id="sampleInterval" value="20" min="1" max="100">
    <div class="points-info" style="margin-top:6px;">
      原始点：<span id="rawPtCount">0</span> &nbsp; 记录点：<span id="recPtCount">0</span>
    </div>
    <label>线条粗细</label>
    <input type="range" id="lineWidth" min="1" max="10" value="3">
    <button class="btn btn-primary" onclick="generateJSON()" style="margin-top:8px;">⚡ 生成 GPS JSON</button>
  </div>

  <!-- 5. JSON 输出 -->
  <div class="section" id="sec-json">
    <div class="sec-title">JSON 输出</div>
    <div class="checkin-result" id="checkinResult"><span class="miss">尚未计算打卡</span></div>
    <div class="json-preview" id="jsonOutput">// 点击"生成 GPS JSON"</div>
    <button class="btn btn-ghost" onclick="copyJSON()">⎘ 复制 JSON</button>
    <button class="btn btn-ghost" onclick="downloadJSON()" style="margin-top:4px;">↓ 下载 JSON</button>
  </div>

</div><!-- /sidebar -->

<!-- CANVAS -->
<div class="canvas-area">
  <div class="canvas-toolbar">
    <span class="tool-label">色</span>
    <div class="tool-group" id="colorBtns">
      <div class="color-btn active" style="background:#4fffb0" onclick="setColor('#4fffb0',this)"></div>
      <div class="color-btn" style="background:#ff6b6b" onclick="setColor('#ff6b6b',this)"></div>
      <div class="color-btn" style="background:#ffd93d" onclick="setColor('#ffd93d',this)"></div>
      <div class="color-btn" style="background:#74b9ff" onclick="setColor('#74b9ff',this)"></div>
      <div class="color-btn" style="background:#fd79a8" onclick="setColor('#fd79a8',this)"></div>
    </div>
    <div class="divider"></div>
    <span class="tool-label">粗</span>
    <div class="tool-group">
      <div class="size-btn active" onclick="setSize(2,this)">S</div>
      <div class="size-btn" onclick="setSize(4,this)">M</div>
      <div class="size-btn" onclick="setSize(7,this)">L</div>
    </div>
  </div>
  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🗺</div>
      <div class="empty-text">上传地图图片开始绘制</div>
    </div>
    <div class="canvas-container" id="canvasContainer" style="display:none;">
      <canvas id="bgCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
  </div>
  <div class="coord-display" id="coordDisplay">lat:— lng:—</div>
</div>
</div><!-- /main-layout -->

<div class="copy-note" id="copyNote">已复制 ✓</div>

<script>
// ══ STATE ═══════════════════════════════════════════════
const state = {
  images: [],      // [{img,imgSrc,neLat,neLng,swLat,swLng,trackSegments,checkinPoints}]
  currentIdx: 0,
  isDrawing: false, isPaused: false,
  drawColor: '#4fffb0', lineWidth: 3,
  lastPos: null, currentSegment: [],
};
let bgCtx, drawCtx, bgCanvas, drawCanvas;

// ══ STORAGE ══════════════════════════════════════════════
const SKEY = 'gps_tracer_v2';
function saveToStorage() {
  try {
    const data = state.images.map(l => ({
      imgBase64: l.imgSrc || null,
      neLat: l.neLat, neLng: l.neLng, swLat: l.swLat, swLng: l.swLng,
      trackSegments: l.trackSegments,
      checkinPoints: l.checkinPoints || [],
    }));
    const settings = {
      totalTime: document.getElementById('totalTime').value,
      minSpeed: document.getElementById('minSpeed').value,
      maxSpeed: document.getElementById('maxSpeed').value,
      sampleInterval: document.getElementById('sampleInterval').value,
    };
    localStorage.setItem(SKEY, JSON.stringify({ layers: data, settings, currentIdx: state.currentIdx }));
  } catch(e) { console.warn('Save failed', e); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (!raw) return false;
    const { layers, settings, currentIdx } = JSON.parse(raw);
    if (!layers || !layers.length) return false;
    if (settings) {
      document.getElementById('totalTime').value = settings.totalTime || 3600;
      document.getElementById('minSpeed').value  = settings.minSpeed  || 2;
      document.getElementById('maxSpeed').value  = settings.maxSpeed  || 20;
      document.getElementById('sampleInterval').value = settings.sampleInterval || 20;
    }
    state.images = [];
    const promises = layers.map((l, i) => new Promise(res => {
      state.images.push({
        img: null, imgSrc: l.imgBase64 || null,
        neLat: l.neLat||'', neLng: l.neLng||'', swLat: l.swLat||'', swLng: l.swLng||'',
        trackSegments: l.trackSegments || [],
        checkinPoints: l.checkinPoints || [],
      });
      if (l.imgBase64) {
        const img = new Image();
        img.onload = () => { state.images[i].img = img; res(); };
        img.src = l.imgBase64;
      } else res();
    }));
    Promise.all(promises).then(() => {
      renderTabs();
      switchTab(Math.min(currentIdx||0, state.images.length-1));
    });
    return true;
  } catch(e) { console.warn('Load failed', e); return false; }
}

// ══ INIT ══════════════════════════════════════════════════
window.onload = () => {
  bgCanvas   = document.getElementById('bgCanvas');
  drawCanvas = document.getElementById('drawCanvas');
  bgCtx  = bgCanvas.getContext('2d');
  drawCtx = drawCanvas.getContext('2d');

  drawCanvas.addEventListener('mousedown',  onMouseDown);
  drawCanvas.addEventListener('mousemove',  onMouseMove);
  drawCanvas.addEventListener('mouseup',    onMouseUp);
  drawCanvas.addEventListener('mouseleave', () => { state.lastPos = null; });
  drawCanvas.addEventListener('touchstart', onTouchStart, { passive: false });
  drawCanvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
  drawCanvas.addEventListener('touchend',   onTouchEnd,   { passive: false });

  document.getElementById('lineWidth').addEventListener('input', function(){ state.lineWidth = +this.value; });
  document.getElementById('sampleInterval').addEventListener('input', () => { redrawAll(); updateStats(); updatePointInfo(); });
  document.getElementById('totalTime').addEventListener('input', updateStats);

  if (!loadFromStorage()) addImageTab();

  // Init collapse (open by default)
  const body = document.getElementById('layerBody');
  body.style.maxHeight = 'none';
};

// ══ TABS ══════════════════════════════════════════════════
function addImageTab() {
  const idx = state.images.length;
  state.images.push({ img:null, imgSrc:null, neLat:'',neLng:'',swLat:'',swLng:'', trackSegments:[], checkinPoints:[] });
  renderTabs();
  switchTab(idx);
}

function renderTabs() {
  const c = document.getElementById('imgTabs');
  c.innerHTML = '';
  state.images.forEach((_, i) => {
    const t = document.createElement('div');
    t.className = 'img-tab' + (i===state.currentIdx?' active':'');
    t.textContent = `图层 ${i+1}`;
    t.onclick = () => switchTab(i);
    c.appendChild(t);
  });
}

function switchTab(idx) {
  saveCurrentCoords();
  state.currentIdx = idx;
  const cur = state.images[idx];
  document.getElementById('neLat').value = cur.neLat;
  document.getElementById('neLng').value = cur.neLng;
  document.getElementById('swLat').value = cur.swLat;
  document.getElementById('swLng').value = cur.swLng;
  renderTabs();
  renderCheckinList();
  if (cur.img) { showCanvas(cur.img); redrawAll(); }
  else { document.getElementById('canvasContainer').style.display='none'; document.getElementById('emptyState').style.display='flex'; }
  updateStats();
  updatePointInfo();
}

function saveCurrentCoords() {
  const cur = state.images[state.currentIdx];
  if (!cur) return;
  cur.neLat = document.getElementById('neLat').value;
  cur.neLng = document.getElementById('neLng').value;
  cur.swLat = document.getElementById('swLat').value;
  cur.swLng = document.getElementById('swLng').value;
  saveToStorage();
}

// ══ IMAGE ══════════════════════════════════════════════════
function loadImage(evt) {
  const file = evt.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      state.images[state.currentIdx].img    = img;
      state.images[state.currentIdx].imgSrc = e.target.result;
      showCanvas(img); redrawAll(); saveToStorage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showCanvas(img) {
  const wrap = document.getElementById('canvasWrapper');
  const maxW = wrap.clientWidth - 40, maxH = wrap.clientHeight - 40;
  const scale = Math.min(maxW/img.width, maxH/img.height, 1);
  const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
  bgCanvas.width=w; bgCanvas.height=h;
  drawCanvas.width=w; drawCanvas.height=h;
  bgCanvas.style.width=w+'px'; bgCanvas.style.height=h+'px';
  drawCanvas.style.width=w+'px'; drawCanvas.style.height=h+'px';
  document.getElementById('canvasContainer').style.width=w+'px';
  document.getElementById('canvasContainer').style.height=h+'px';
  bgCtx.clearRect(0,0,w,h); bgCtx.drawImage(img,0,0,w,h);
  document.getElementById('emptyState').style.display='none';
  document.getElementById('canvasContainer').style.display='inline-block';
}

// ══ DRAWING CONTROLS ════════════════════════════════════
function startDrawing() {
  if (!state.images[state.currentIdx].img) { alert('请先上传地图图片'); return; }
  state.isDrawing=true; state.isPaused=false; state.lastPos=null; state.currentSegment=[];
  document.getElementById('drawBtn').disabled=true;
  document.getElementById('pauseBtn').disabled=false;
  setStatus('drawing','绘制中');
}

function pauseDrawing() {
  if (!state.isDrawing||state.isPaused) return;
  if (state.currentSegment.length>0) {
    state.images[state.currentIdx].trackSegments.push([...state.currentSegment]);
    state.currentSegment=[];
  }
  state.isPaused=true; state.lastPos=null;
  setStatus('paused','已暂停');
  document.getElementById('pauseBtn').textContent='▶ 继续';
  document.getElementById('drawBtn').disabled=false;
  document.getElementById('drawBtn').textContent='▶ 继续绘制';
  document.getElementById('drawBtn').onclick=resumeDrawing;
}

function resumeDrawing() {
  state.isPaused=false; state.currentSegment=[]; state.lastPos=null;
  document.getElementById('drawBtn').disabled=true;
  document.getElementById('pauseBtn').disabled=false;
  document.getElementById('pauseBtn').textContent='⏸ 暂停';
  setStatus('drawing','绘制中');
}

function stopIfDrawing() {
  if (!state.isDrawing||state.isPaused) return;
  if (state.currentSegment.length>0) {
    state.images[state.currentIdx].trackSegments.push([...state.currentSegment]);
    state.currentSegment=[];
  }
  state.lastPos=null; updateStats(); updatePointInfo(); saveToStorage();
}

function clearTrack() {
  const cur = state.images[state.currentIdx];
  cur.trackSegments=[]; state.currentSegment=[]; state.lastPos=null;
  state.isDrawing=false; state.isPaused=false;
  document.getElementById('drawBtn').disabled=false;
  document.getElementById('drawBtn').textContent='▶ 开始绘制';
  document.getElementById('drawBtn').onclick=startDrawing;
  document.getElementById('pauseBtn').disabled=true;
  document.getElementById('pauseBtn').textContent='⏸ 暂停';
  setStatus('idle','待机');
  redrawAll(); updateStats(); updatePointInfo();
  document.getElementById('jsonOutput').textContent='// 点击"生成 GPS JSON"';
  saveToStorage();
}

function undoLast() {
  const cur = state.images[state.currentIdx];
  if (!cur.trackSegments.length) return;
  cur.trackSegments.pop(); state.currentSegment=[]; state.lastPos=null;
  redrawAll(); updateStats(); updatePointInfo(); saveToStorage();
}

// ══ MOUSE / TOUCH ═════════════════════════════════════════
function getPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  return { x: e.clientX-r.left, y: e.clientY-r.top };
}

function onMouseDown(e) {
  const pos = getPos(e);
  if (!state.isDrawing||state.isPaused) { handleCheckinClick(pos); return; }
  state.lastPos=pos; state.currentSegment.push(pos); drawDot(pos);
}
function onMouseMove(e) {
  const pos = getPos(e);
  updateCoordDisplay(pos);
  if (!state.isDrawing||state.isPaused||!state.lastPos||e.buttons!==1) return;
  drawLine(state.lastPos, pos);
  state.currentSegment.push(pos); state.lastPos=pos;
  updateStats(); updatePointInfo();
}
function onMouseUp()  { stopIfDrawing(); }

function onTouchStart(e) {
  e.preventDefault();
  const pos = getPos(e.touches[0]);
  if (!state.isDrawing||state.isPaused) { handleCheckinClick(pos); return; }
  state.lastPos=pos; state.currentSegment.push(pos); drawDot(pos);
}
function onTouchMove(e) {
  e.preventDefault();
  if (!state.isDrawing||state.isPaused||!state.lastPos) return;
  const pos = getPos(e.touches[0]);
  drawLine(state.lastPos, pos);
  state.currentSegment.push(pos); state.lastPos=pos;
  updateStats(); updatePointInfo();
}
function onTouchEnd(e) { e.preventDefault(); stopIfDrawing(); }

// ══ DRAW PRIMITIVES ══════════════════════════════════════
function drawDot(p) {
  drawCtx.beginPath(); drawCtx.arc(p.x, p.y, state.lineWidth/2, 0, Math.PI*2);
  drawCtx.fillStyle=state.drawColor; drawCtx.fill();
}
function drawLine(a, b) {
  drawCtx.beginPath(); drawCtx.moveTo(a.x,a.y); drawCtx.lineTo(b.x,b.y);
  drawCtx.strokeStyle=state.drawColor; drawCtx.lineWidth=state.lineWidth;
  drawCtx.lineCap='round'; drawCtx.lineJoin='round';
  drawCtx.shadowBlur=8; drawCtx.shadowColor=state.drawColor;
  drawCtx.stroke(); drawCtx.shadowBlur=0;
}

function redrawAll() {
  const cur = state.images[state.currentIdx];
  if (!cur.img) return;
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgCtx.drawImage(cur.img,0,0,bgCanvas.width,bgCanvas.height);
  drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  cur.trackSegments.forEach(seg => {
    if (!seg.length) return;
    drawCtx.beginPath(); drawCtx.moveTo(seg[0].x,seg[0].y);
    for (let i=1;i<seg.length;i++) drawCtx.lineTo(seg[i].x,seg[i].y);
    drawCtx.strokeStyle=state.drawColor; drawCtx.lineWidth=state.lineWidth;
    drawCtx.lineCap='round'; drawCtx.lineJoin='round';
    drawCtx.shadowBlur=8; drawCtx.shadowColor=state.drawColor;
    drawCtx.stroke(); drawCtx.shadowBlur=0;
    drawCtx.beginPath(); drawCtx.arc(seg[0].x,seg[0].y,5,0,Math.PI*2);
    drawCtx.fillStyle='#fff'; drawCtx.fill();
  });
  const interval = parseInt(document.getElementById('sampleInterval').value)||20;
  getAllRawPoints().forEach((p,i) => {
    if (i%interval===0) {
      drawCtx.beginPath(); drawCtx.arc(p.x,p.y,3,0,Math.PI*2);
      drawCtx.fillStyle='rgba(255,255,255,.7)'; drawCtx.strokeStyle=state.drawColor; drawCtx.lineWidth=1;
      drawCtx.fill(); drawCtx.stroke();
    }
  });
  drawCheckinPoints();
}

// ══ GPS MAPPING ═══════════════════════════════════════════
function pixelToGPS(px,py) {
  const cur=state.images[state.currentIdx];
  const neLat=+cur.neLat,neLng=+cur.neLng,swLat=+cur.swLat,swLng=+cur.swLng;
  if ([neLat,neLng,swLat,swLng].some(isNaN)) return null;
  const w=drawCanvas.width, h=drawCanvas.height;
  return { lat: neLat-(py/h)*(neLat-swLat), lng: swLng+(px/w)*(neLng-swLng) };
}
function gpsToPixel(lat,lng) {
  const cur=state.images[state.currentIdx];
  const neLat=+cur.neLat,neLng=+cur.neLng,swLat=+cur.swLat,swLng=+cur.swLng;
  if ([neLat,neLng,swLat,swLng].some(isNaN)) return null;
  return { x:((lng-swLng)/(neLng-swLng))*drawCanvas.width, y:((neLat-lat)/(neLat-swLat))*drawCanvas.height };
}
function updateCoordDisplay(pos) {
  const g=pixelToGPS(pos.x,pos.y);
  document.getElementById('coordDisplay').textContent = g
    ? `lat:${g.lat.toFixed(6)} lng:${g.lng.toFixed(6)}`
    : `x:${Math.round(pos.x)} y:${Math.round(pos.y)} | 请填写坐标`;
}

// ══ STATS ══════════════════════════════════════════════════
function getAllRawPoints() { return state.images[state.currentIdx].trackSegments.flat(); }

function calcPixelDist(pts) {
  let d=0;
  for (let i=1;i<pts.length;i++) { const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y; d+=Math.sqrt(dx*dx+dy*dy); }
  return d;
}
function pixelToMeters(px) {
  const cur=state.images[state.currentIdx];
  const neLat=+cur.neLat,neLng=+cur.neLng,swLat=+cur.swLat,swLng=+cur.swLng;
  if ([neLat,neLng,swLat,swLng].some(isNaN)) return px;
  const w=drawCanvas.width||1, h=drawCanvas.height||1;
  const cLat=(neLat+swLat)/2;
  const mW=Math.abs(neLng-swLng)*111320*Math.cos(cLat*Math.PI/180);
  const mH=Math.abs(neLat-swLat)*111320;
  return px*(mW/w+mH/h)/2;
}
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, dL=(lat2-lat1)*Math.PI/180, dG=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function updateStats() {
  const pts=getAllRawPoints(), d=pixelToMeters(calcPixelDist(pts));
  const t=+(document.getElementById('totalTime').value)||3600;
  const iv=+(document.getElementById('sampleInterval').value)||20;
  document.getElementById('totalDistStat').textContent = d>=1000?(d/1000).toFixed(3)+' km':d.toFixed(1)+' m';
  document.getElementById('recordedPtsStat').textContent = Math.floor(pts.length/iv);
  document.getElementById('avgSpeedStat').textContent = (d/t).toFixed(2)+' m/s';
}
function updatePointInfo() {
  const pts=getAllRawPoints(), iv=+(document.getElementById('sampleInterval').value)||20;
  document.getElementById('rawPtCount').textContent = pts.length;
  document.getElementById('recPtCount').textContent = Math.floor(pts.length/iv);
}

// ══ SPEED COMPUTATION ════════════════════════════════════
function computeSpeedsAndTimes(segM, totalTime, sMin, sMax) {
  const n=segM.length; if (!n) return {speeds:[],times:[]};
  const rawSpeeds = Array.from({length:n},(_,i) => {
    const x = n>1?(i/(n-1))*6-3:0;
    const g = Math.exp(-x*x/2);
    return sMin + g*(sMax-sMin);
  });
  const rawTimes = segM.map((d,i) => rawSpeeds[i]>0?d/rawSpeeds[i]:0);
  const sum = rawTimes.reduce((a,b)=>a+b,0);
  const scale = sum>0?totalTime/sum:1;
  const times = rawTimes.map(t=>t*scale);
  const speeds = segM.map((d,i)=>times[i]>0?d/times[i]:0);
  return {speeds,times};
}

// ══ JSON GENERATION ══════════════════════════════════════
function generateJSON() {
  saveCurrentCoords();
  const cur = state.images[state.currentIdx];
  const allPts = getAllRawPoints();
  const interval = +(document.getElementById('sampleInterval').value)||20;
  const totalTime = +(document.getElementById('totalTime').value)||3600;
  const sMin = +(document.getElementById('minSpeed').value)||2;
  const sMax = +(document.getElementById('maxSpeed').value)||20;

  // Sample
  const sampled=[];
  for (let i=0;i<allPts.length;i+=interval) sampled.push(allPts[i]);
  if (allPts.length>0 && (allPts.length-1)%interval!==0) sampled.push(allPts[allPts.length-1]);
  if (sampled.length<2) { document.getElementById('jsonOutput').textContent='// 轨迹点不足'; return; }

  // Segment meters
  const segM=[];
  for (let i=0;i<sampled.length-1;i++) {
    const dx=sampled[i+1].x-sampled[i].x, dy=sampled[i+1].y-sampled[i].y;
    segM.push(pixelToMeters(Math.sqrt(dx*dx+dy*dy)));
  }

  const totalM = pixelToMeters(calcPixelDist(allPts));
  const {speeds, times} = computeSpeedsAndTimes(segM, totalTime, sMin, sMax);

  // Cumulative dist for d field
  const cumDist=[0];
  for (let i=0;i<segM.length;i++) cumDist.push(cumDist[i]+segM[i]);

  // Find SECOND point crossing each km milestone
  const milestoneIdx={};
  if (totalM>=1000) {
    const maxKm=Math.floor(totalM/1000);
    for (let km=1;km<=maxKm;km++) {
      const thr=km*1000; let count=0;
      for (let i=0;i<cumDist.length;i++) {
        if (cumDist[i]>=thr) { count++; if (count===2) { milestoneIdx[i]=km; break; } }
      }
    }
  }

  // Build points
  const pts=sampled.map((p,i) => {
    const g=pixelToGPS(p.x,p.y);
    const pt={
      a: g?parseFloat(g.lat.toFixed(6)):null,
      o: g?parseFloat(g.lng.toFixed(6)):null,
      s: parseFloat((i<speeds.length?speeds[i]:0).toFixed(2)),
    };
    if (milestoneIdx[i]!==undefined) pt.d=milestoneIdx[i];
    return pt;
  });

  const json = JSON.stringify(pts, null, 2);
  document.getElementById('jsonOutput').textContent = json;
  state._lastJSON = json;
  state._lastTimes = times;

  // Checkin result
  document.getElementById('checkinResult').innerHTML = computeCheckins(pts, times);

  redrawAll(); updateStats(); updatePointInfo();
}

// ══ CHECKIN POINTS ════════════════════════════════════════
function addCheckinPoint() {
  state.images[state.currentIdx].checkinPoints.push({name:'打卡点',lat:'',lng:'',size:30,active:false});
  renderCheckinList(); saveToStorage();
}
function deleteCheckinPoint(i) {
  state.images[state.currentIdx].checkinPoints.splice(i,1);
  renderCheckinList(); redrawAll(); saveToStorage();
}
function toggleCheckin(i) {
  const cp=state.images[state.currentIdx].checkinPoints[i];
  cp.active=!cp.active;
  renderCheckinList(); redrawAll(); saveToStorage();
}
function updateCheckin(i, field, val) {
  const cp=state.images[state.currentIdx].checkinPoints[i];
  if (field==='size') val=parseFloat(val)||0;
  cp[field]=val;
  if (['size','lat','lng'].includes(field)) redrawAll();
  saveToStorage();
}

function renderCheckinList() {
  const cur=state.images[state.currentIdx];
  const list=document.getElementById('checkinList');
  list.innerHTML='';
  (cur.checkinPoints||[]).forEach((pt,i) => {
    const el=document.createElement('div');
    el.className='checkin-item'+(pt.active?' active':'');
    el.innerHTML=`
      <div class="ci-header">
        <div class="ci-icon" onclick="toggleCheckin(${i})" title="点击激活/取消"></div>
        <input class="ci-name-input" value="${pt.name}" onchange="updateCheckin(${i},'name',this.value)" placeholder="打卡点名称">
        <button class="ci-del" onclick="deleteCheckinPoint(${i})">✕</button>
      </div>
      <div class="ci-fields">
        <input type="number" step="0.000001" placeholder="纬度" value="${pt.lat}" onchange="updateCheckin(${i},'lat',this.value)">
        <input type="number" step="0.000001" placeholder="经度" value="${pt.lng}" onchange="updateCheckin(${i},'lng',this.value)">
        <input type="number" placeholder="直径px" value="${pt.size}" min="4" onchange="updateCheckin(${i},'size',this.value)">
      </div>
`;
    list.appendChild(el);
  });
}

function drawCheckinPoints() {
  const cur=state.images[state.currentIdx];
  (cur.checkinPoints||[]).forEach(pt => {
    const lat=parseFloat(pt.lat), lng=parseFloat(pt.lng);
    if (isNaN(lat)||isNaN(lng)) return;
    const pos=gpsToPixel(lat,lng); if (!pos) return;
    const r=(pt.size||30)/2;
    // Draw circle
    drawCtx.beginPath();
    drawCtx.arc(pos.x, pos.y, r, 0, Math.PI*2);
    drawCtx.strokeStyle = pt.active?'#4fffb0':'#6b7a99';
    drawCtx.lineWidth=2;
    if (pt.active) { drawCtx.shadowBlur=14; drawCtx.shadowColor='#4fffb0'; }
    drawCtx.stroke(); drawCtx.shadowBlur=0;
    // Minus
    drawCtx.beginPath();
    drawCtx.moveTo(pos.x-r*.4, pos.y);
    drawCtx.lineTo(pos.x+r*.4, pos.y);
    drawCtx.strokeStyle=pt.active?'#4fffb0':'#6b7a99';
    drawCtx.lineWidth=2; drawCtx.stroke();
  });
}

function handleCheckinClick(pos) {
  const cur=state.images[state.currentIdx];
  (cur.checkinPoints||[]).forEach((pt,i) => {
    const lat=parseFloat(pt.lat), lng=parseFloat(pt.lng);
    if (isNaN(lat)||isNaN(lng)) return;
    const p=gpsToPixel(lat,lng); if (!p) return;
    const r=(pt.size||30)/2+4;
    const dx=pos.x-p.x, dy=pos.y-p.y;
    if (Math.sqrt(dx*dx+dy*dy)<=r) toggleCheckin(i);
  });
}

// ══ CHECKIN CALCULATION ══════════════════════════════════
function computeCheckins(pts, times) {
  const cur=state.images[state.currentIdx];
  const active=(cur.checkinPoints||[]).filter(p=>p.active&&p.lat&&p.lng);
  if (!active.length) return '<span class="miss">没有激活的打卡点</span>';
  let html='';
  active.forEach(cp => {
    const cpLat=parseFloat(cp.lat), cpLng=parseFloat(cp.lng);
    let found=false, elapsed=0;
    for (let i=0;i<pts.length;i++) {
      if (i>0) elapsed+=times[i-1]||0;
      const p=pts[i];
      if (p.a==null||p.o==null) continue;
      if (haversine(p.a,p.o,cpLat,cpLng)<=200) {
        html+=`<div><span class="hit">✓ ${cp.name}</span>　${p.a.toFixed(6)}, ${p.o.toFixed(6)}　t=${elapsed.toFixed(1)}s</div>`;
        found=true; break;
      }
    }
    if (!found) html+=`<div><span class="miss">✗ ${cp.name}</span>　未打卡</div>`;
  });
  return html;
}

// ══ COLLAPSIBLE ═══════════════════════════════════════════
function toggleSection(titleId, bodyId) {
  const title=document.getElementById(titleId);
  const body=document.getElementById(bodyId);
  const isCollapsed=body.classList.toggle('collapsed');
  title.classList.toggle('collapsed', isCollapsed);
  if (!isCollapsed) {
    body.style.maxHeight=body.scrollHeight+'px';
    setTimeout(()=>{ body.style.maxHeight='none'; }, 260);
  } else {
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>{ body.style.maxHeight='0'; });
  }
}

// ══ UI HELPERS ════════════════════════════════════════════
function setStatus(type, text) {
  document.getElementById('statusBadge').className='status-badge status-'+type;
  document.getElementById('statusText').textContent=text;
}
function setColor(c, el) {
  state.drawColor=c;
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setSize(s, el) {
  state.lineWidth=s;
  document.getElementById('lineWidth').value=s;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function copyJSON() {
  if (!state._lastJSON) { alert('请先生成 JSON'); return; }
  navigator.clipboard.writeText(state._lastJSON).then(()=>{
    const n=document.getElementById('copyNote');
    n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),2000);
  });
}
function downloadJSON() {
  if (!state._lastJSON) { alert('请先生成 JSON'); return; }
  const b=new Blob([state._lastJSON],{type:'application/json'});
  const u=URL.createObjectURL(b), a=document.createElement('a');
  a.href=u; a.download=`gps_track_layer${state.currentIdx+1}_${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(u);
}
</script>
</body>
